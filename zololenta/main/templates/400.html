<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Некорректный запрос — Золотая лента</title>

  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #30291f;
      background:
        radial-gradient(circle at 80% 15%,
          rgba(202, 158, 68, .22),
          transparent 30%),
        linear-gradient(135deg, #faf6ed, #ead8b2);
    }

    main {
      width: min(700px, 100%);
      padding: 56px 42px;
      text-align: center;
      background: rgba(255, 255, 255, .76);
      border: 1px solid rgba(114, 82, 28, .16);
    }

    small {
      color: #9b7127;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 17px 0;
      font-family: Georgia, serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 1;
    }

    p {
      max-width: 520px;
      margin: 0 auto 30px;
      color: #746b5e;
      line-height: 1.7;
    }

    a {
      display: inline-block;
      padding: 14px 24px;
      color: #fff;
      background: #9f7428;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <main data-error-page="400">
    <small>Ошибка 400</small>
    <h1>Некорректный запрос</h1>
    <p>
      Сервер не смог обработать запрос.
      Вернитесь на главную страницу и повторите действие.
    </p>
    <a href="/">Вернуться на главную</a>
  </main>
</body>
</html>
