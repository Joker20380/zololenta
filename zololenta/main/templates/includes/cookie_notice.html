{% if not request.COOKIES.cookies_accepted %}
    <style>
        #cookie-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: fit-content;
            max-width: 90%;
            background: rgba(255, 245, 240, 0.95); /* светло-кремовый */
            backdrop-filter: blur(6px);
            color: #5c2e36; /* тёплый темно-розовый для текста */
            padding: 14px 22px;
            border-radius: 14px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            border: 1px solid #f1b8c4;
        }

        #cookie-banner.show {
            transform: translateX(-50%) translateY(0);
        }

        #cookie-banner a {
            color: #d77e91; /* приглушённый клубничный */
            text-decoration: underline;
        }

        #accept-cookies {
            background: #f1b8c4;
            border: none;
            color: #5c2e36;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        #accept-cookies:hover {
            background: #f7c8d2;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            #cookie-banner {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                text-align: center;
            }

            #accept-cookies {
                width: 100%;
            }
        }
    </style>

    <div id="cookie-banner">
        <span>
            Мы используем cookies для улучшения сайта. Подробнее в 
            <a href="{% url 'confidential_information' %}">политике конфиденциальности</a>.
        </span>
        <button id="accept-cookies">Принять</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const banner = document.getElementById('cookie-banner');
            if (banner) {
                setTimeout(() => {
                    banner.classList.add('show');
                }, 200);

                document.getElementById('accept-cookies')?.addEventListener('click', function() {
                    banner.classList.remove('show');
                    document.cookie = "cookies_accepted=true; path=/; max-age=" + 60*60*24*365;
                    setTimeout(() => {
                        banner.style.display = 'none';
                    }, 600);
                });
            }
        });
    </script>
{% endif %}
